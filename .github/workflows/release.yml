name: release

# Build installers on real macOS + Windows runners and attach them to the
# GitHub release for the pushed tag. Trigger by pushing a tag like v0.1.1,
# or run manually (workflow_dispatch) to just produce build artifacts.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: dist:mac
            artifacts: dist/*.dmg
          - os: windows-latest
            script: dist:win
            artifacts: dist/*.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps (rebuilds native modules for Electron)
        run: npm install

      - name: Build installer (build only, no auto-publish)
        run: npm run ${{ matrix.script }} -- --publish never

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: ${{ matrix.artifacts }}
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifacts }}
